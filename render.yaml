services:
  - type: web
    name: finshield-api
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
    startCommand: |
      cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finshield-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false   # Set this manually in Render dashboard after Vercel deploys
    healthCheckPath: /health

databases:
  - name: finshield-db
    plan: free
